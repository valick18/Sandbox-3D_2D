<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui">
        <div id="crosshair">+</div>
        <div id="instructions">
            <h1>Procedural 3D Sandbox</h1>
            <div id="menu-buttons" style="margin-top: 20px; text-align: center;">
                <button id="btn-new-world" style="padding: 10px 20px; font-size: 18px; cursor: pointer;">New World</button>
                <button id="btn-load-world" style="padding: 10px 20px; font-size: 18px; cursor: pointer; margin-left:10px;" disabled>Load World</button>
            </div>
            <p>Click screen to play (Generates World)</p>
            <p>WASD to move, Space to jump</p>
            <p>Left Click: Break | Right Click: Place</p>
            <p>Press E to Craft</p>
            <p id="menu-warning" style="color: yellow; display: none;">Generating, please wait...</p>
        </div>
        <div id="debug-text" style="position:absolute; top:10px; left:10px; color:white; font-family:monospace; pointer-events:none; z-index:99999; text-shadow:1px 1px 0 #000; font-size:16px;"></div>
        <div id="hotbar"></div>
        <div id="ui-backdrop" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); pointer-events:auto;"></div>
        <div id="crafting" style="display:none;">
            <h2>Crafting</h2>
            <div id="recipe-list"></div>
        </div>
        <div id="chest-ui" style="display:none;">
            <h2>Chest</h2>
            <div id="chest-grid"></div>
            <h2>Inventory</h2>
            <div id="player-grid"></div>
        </div>
        
        <div id="chat-container" style="display:none; position:absolute; bottom:100px; left:20px; width:400px; pointer-events:auto;">
            <div id="chat-log" style="max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); color:white; padding:10px; border-radius:4px; font-family:monospace; font-size:14px; margin-bottom:5px; pointer-events:none;"></div>
            <input type="text" id="chat-input" placeholder="Type command... /help" style="width:100%; box-sizing:border-box; background:rgba(0,0,0,0.8); border:1px solid #777; color:white; padding:8px; border-radius:4px; outline:none;">
        </div>
        <div id="sun-glare" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; background:white; opacity:0; z-index:100; transition: opacity 0.1s linear;"></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
