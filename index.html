<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Procedural Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div id="inventory-bar"></div>
        <div id="stats">Health: <span id="health-val">100</span> | FPS: <span id="fps-val">0</span></div>
        <div id="start-screen">
            <h1>Procedural Sandbox</h1>
            <p>Click to Start (Generates World & Audio)</p>
            <button id="btn-start">Play</button>
        </div>
        <div id="crafting-menu" style="display: none;">
            <h2>Crafting</h2>
            <div id="recipe-list"></div>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>

    <script type="module" src="js/main.js"></script>
</body>
</html>
